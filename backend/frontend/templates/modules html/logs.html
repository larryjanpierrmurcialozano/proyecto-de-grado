<div class="card">
    <div class="card-header-flex">
        <h2 class="card-title" style="border:none;margin:0;padding:0;">
            <i class="fas fa-history"></i> Logs del Sistema
        </h2>
    </div>
    <div class="filtros-container">
        <div class="busqueda-box">
            <i class="fas fa-search"></i>
            <input type="text" id="buscar-log" placeholder="Buscar por usuario, accion o descripcion...">
        </div>
        <select id="filtro-accion-log" class="filtro-select">
            <option value="">Todas las acciones</option>
        </select>
    </div>
    <div class="tabla-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Usuario</th>
                    <th>Accion</th>
                    <th>Exito</th>
                    <th>Tabla</th>
                    <th>Registro</th>
                    <th>IP</th>
                    <th>User Agent</th>
                    <th>Descripcion</th>
                </tr>
            </thead>
            <tbody id="tabla-logs-body">
                <!-- Se llena con JS -->
            </tbody>
        </table>
    </div>
</div>
