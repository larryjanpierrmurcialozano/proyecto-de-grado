<div class="card obs-shell">
    <div class="card-header-flex obs-header-flex">
        <div class="obs-title-wrap">
            <h2 class="card-title" style="border:none;margin:0;padding:0;">
                <i class="fas fa-eye"></i> Observador del Estudiante
            </h2>
            <p>Registro organizado por grupo y seguimiento disciplinario del estudiante.</p>
        </div>
        <div class="obs-header-actions">
            <button class="btn btn-cafe" onclick="descargarFormatoObservador()">
                <i class="fas fa-file-pdf"></i> PDF directo
            </button>
            <button class="btn btn-cafe" onclick="imprimirFormatoObservador()">
                <i class="fas fa-print"></i> Formato en blanco
            </button>
            <button class="btn btn-verde" onclick="abrirModalObservacion()">
                <i class="fas fa-plus"></i> Nueva Observacion
            </button>
        </div>
    </div>

    <div id="obs-stats-container"></div>
    <div id="obs-guia-container"></div>

    <div class="obs-filtros-panel">
        <div class="obs-filtro-item obs-filtro-busqueda">
            <label><i class="fas fa-search"></i> Buscar</label>
            <div class="busqueda-box">
                <i class="fas fa-search"></i>
                <input type="text" id="filtro-observador-buscar" placeholder="Buscar por estudiante, descripcion o docente...">
            </div>
        </div>
        <div class="obs-filtro-item">
            <label><i class="fas fa-layer-group"></i> Grupo</label>
            <select class="filtro-select" id="filtro-observador-grupo">
                <option value="">Todos los grupos</option>
            </select>
        </div>
        <div class="obs-filtro-item">
            <label><i class="fas fa-user-graduate"></i> Estudiante</label>
            <select class="filtro-select" id="filtro-observador-estudiante"></select>
        </div>
        <div class="obs-filtro-item">
            <label><i class="fas fa-tags"></i> Tipo</label>
            <select class="filtro-select" id="filtro-observador-tipo">
                <option value="">Todos los tipos</option>
                <option value="Positiva">Positiva</option>
                <option value="Negativa">Negativa</option>
                <option value="Neutra">Neutra</option>
            </select>
        </div>
        <!-- IF_ADVANCED_PROTOCOL -->
        <div class="obs-filtro-item">
            <label><i class="fas fa-shield-alt"></i> Protocolo</label>
            <select class="filtro-select" id="filtro-observador-protocolo">
                <option value="">Todos los protocolos</option>
                <option value="TIPO_1">Tipo 1</option>
                <option value="TIPO_2">Tipo 2</option>
                <option value="TIPO_3">Tipo 3</option>
            </select>
        </div>
        <div class="obs-filtro-item">
            <label><i class="fas fa-flag"></i> Estado</label>
            <select class="filtro-select" id="filtro-observador-estado">
                <option value="">Todos los estados</option>
                <option value="Abierto">Abierto</option>
                <option value="Seguimiento">Seguimiento</option>
                <option value="Cerrado">Cerrado</option>
            </select>
        </div>
        <!-- ENDIF_ADVANCED_PROTOCOL -->
    </div>

    <div class="tabla-container obs-tabla-wrap">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Estudiante</th>
                    <th>Tipo</th>
                    <!-- IF_ADVANCED_PROTOCOL_HEADER -->
                    <th>Protocolo</th>
                    <th>Estado</th>
                    <!-- ENDIF_ADVANCED_PROTOCOL_HEADER -->
                    <th>Descripcion</th>
                    <th>Registrado por</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-observador-body"></tbody>
        </table>
    </div>

    <div class="paginacion obs-paginacion">
        <span class="paginacion-info" id="obs-total-registros"></span>
    </div>
</div>
