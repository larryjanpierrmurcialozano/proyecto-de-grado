<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión en DOCSTRY">
    
    <title>Iniciar Sesión - DOCSTRY</title>
    
    <!-- fuente de los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- fuente de tipografía de google fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Notyf para notificaciones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="auth-container">
        <!-- Left Panel (Decorativo) -->
        <div class="auth-left">
            <div class="fondo-animado"></div>
            <div class="brand">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Docstry">
            </div>
            <div class="auth-decoration">
                <i class="fas fa-chart-line"></i>
                <p>Plataforma integral de gestión académica</p>
            </div>
        </div>

        <!-- Right Panel (Formulario) -->
        <div class="auth-right">
            <div class="auth-box">
                <h2>Iniciar Sesión</h2>
                <p class="auth-subtitle">Bienvenido de vuelta</p>

                <!-- Formulario de Login -->
                <form id="loginForm" class="auth-form">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="tu@email.com"
                            required
                        >
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <!-- Contraseña -->
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Contraseña
                        </label>
                        <div class="password-input">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="••••••••"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <!-- Recordar y Olvidé Contraseña -->
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember" id="remember">
                            <span>Recuérdame</span>
                        </label>
                        <a href="/bienvenida#contacto" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                    <!-- Botón Submit -->
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                    </button>

                    <!-- Error General -->
                    <div class="error-box" id="generalError" style="display: none;"></div>
                </form>

                <!-- Divisor -->
                <!-- Link a Bienvenida -->
                <a href="/bienvenida" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Volver atrás
                </a>
            </div>


        </div>
    </div>

    <!-- Notyf -->
    <script src="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.js"></script>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
