<div class="card cal-card">
    <div class="card-header-flex cal-header-top">
        <h2 class="card-title" style="border:none;margin:0;padding:0;">
            <i class="fas fa-chalkboard"></i> Mis Clases - Registro de Notas
        </h2>
        <div class="cal-header-actions">
            <button id="btn-agregar-actividad-mis" class="btn btn-verde" style="display:none;">
                <i class="fas fa-plus"></i> Agregar Actividad
            </button>
            <button id="btn-guardar-todo-mis" class="btn btn-cafe" style="display:none;">
                <i class="fas fa-save"></i> Guardar Cambios
            </button>
        </div>
    </div>

    <div class="cal-filtros cal-bloque">
        <div class="cal-filtro-item">
            <label><i class="fas fa-layer-group"></i> Grado</label>
            <select id="mc-filtro-grado">
                <option value="">Todas mis clases...</option>
            </select>
        </div>
        <div class="cal-filtro-item">
            <label><i class="fas fa-users"></i> Grupo</label>
            <select id="mc-filtro-grupo" disabled>
                <option value="">Seleccionar grupo...</option>
            </select>
        </div>
        <div class="cal-filtro-item">
            <label><i class="fas fa-book"></i> Materia</label>
            <select id="mc-filtro-materia" disabled>
                <option value="">Seleccionar materia...</option>
            </select>
        </div>
        <div class="cal-filtro-item">
            <label><i class="fas fa-calendar-alt"></i> Período</label>
            <select id="mc-filtro-periodo"></select>
        </div>
    </div>

    <div class="calificaciones-footer cal-bloque">
        <button id="btn-abrir-linea-mis" class="btn btn-info" disabled>
            <i class="fas fa-edit"></i> Editar Notas Aquí
        </button>
        <button id="btn-descargar-mis" class="btn btn-primary" disabled>
            <i class="fas fa-file-excel"></i> Descargar Excel
        </button>
    </div>

    <div id="mc-ponderacion-bar" class="cal-ponderacion-bar cal-bloque" style="display:none;">
        <div class="cal-ponderacion-info">
            <span><i class="fas fa-chart-pie"></i> Ponderación total:</span>
            <strong id="mc-ponderacion-valor">0%</strong>
            <span>de 100%</span>
        </div>
        <div class="cal-ponderacion-track">
            <div id="mc-ponderacion-fill" class="cal-ponderacion-fill" style="width:0%;"></div>
        </div>
    </div>

    <div id="mc-tabla-wrapper" class="cal-tabla-wrapper cal-bloque">
        <div class="cal-placeholder">
            <i class="fas fa-hand-point-up fa-3x"></i>
            <p>Selecciona Grado, Grupo y Materia; luego usa Editar Notas Aquí.</p>
        </div>
    </div>

    <div id="mc-leyenda" class="cal-leyenda" style="display:none;">
        <span class="cal-leyenda-item"><span class="cal-leyenda-color cal-leyenda-superior"></span> Superior (≥4.6)</span>
        <span class="cal-leyenda-item"><span class="cal-leyenda-color cal-leyenda-alto"></span> Alto (≥4.0)</span>
        <span class="cal-leyenda-item"><span class="cal-leyenda-color cal-leyenda-basico"></span> Básico (≥3.0)</span>
        <span class="cal-leyenda-item"><span class="cal-leyenda-color cal-leyenda-bajo"></span> Bajo (&lt;3.0)</span>
    </div>
</div>

<div id="modal-mis-actividad" class="modal-overlay">
    <div class="modal-content" style="max-width:560px;">
        <div class="modal-header">
            <h3 id="modal-mis-actividad-titulo">Nueva Actividad</h3>
            <button class="modal-close" id="btn-cerrar-modal-mis">&times;</button>
        </div>
        <form id="form-mis-actividad">
            <input type="hidden" id="mis-actividad-id">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre</label>
                    <input id="mis-act-nombre" class="form-control" maxlength="150" required>
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="mis-act-tipo" class="form-control">
                        <option value="Tarea">Tarea</option>
                        <option value="Quiz">Quiz</option>
                        <option value="Proyecto">Proyecto</option>
                        <option value="Evaluación">Evaluación</option>
                        <option value="Clase">Clase</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ponderación (%)</label>
                    <input id="mis-act-ponderacion" type="number" class="form-control" min="0.01" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Puntaje Máximo</label>
                    <input id="mis-act-puntaje-max" type="number" class="form-control" min="0.01" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Fecha de Actividad</label>
                    <input id="fecha_actividad_mis" type="date" class="form-control" required>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" id="btn-cancelar-modal-mis" class="btn btn-secondary">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar Actividad</button>
            </div>
        </form>
    </div>
</div>
